<!DOCTYPE html>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --ink:#1F4D3D; --ink-soft:#3E6B5A; --paper:#FBFAF6; --paper-dark:#EFEDE4;
    --red:#B23A2E; --green:#2F7A4D; --text:#232120;
    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',monospace; --sans:'Inter',system-ui,-apple-system,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--paper); font-family:var(--sans); color:var(--text); -webkit-tap-highlight-color:transparent; }
  #app { max-width:560px; margin:0 auto; min-height:100vh; padding-bottom:84px; }
  header.topbar { position:sticky; top:0; background:var(--paper); z-index:10; border-bottom:1px solid var(--paper-dark); padding:14px 16px 10px; }
  header.topbar .title { font-family:var(--mono); font-weight:700; font-size:13px; letter-spacing:0.12em; color:var(--ink); }
  .setup-banner { margin:14px 16px; padding:12px 14px; background:#FFF4E8; border:1px solid #E0B27A; border-radius:8px; font-size:12px; color:#7A4A16; line-height:1.5; }

  .empty-state { padding:50px 24px; text-align:center; font-size:13px; color:var(--ink-soft); }
  .section-label { font-family:var(--mono); font-size:11px; color:var(--ink-soft); letter-spacing:0.06em; margin:18px 0 8px; }
  .helper-text { font-size:12px; color:var(--ink-soft); line-height:1.5; margin-bottom:10px; }
  .btn { border:none; border-radius:8px; padding:11px 16px; font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
  .btn-primary { background:var(--ink); color:var(--paper); width:100%; }
  .btn-primary:disabled { opacity:.5; }
  .btn-secondary { background:#fff; color:var(--ink); border:1px solid var(--ink-soft); }
  .btn-small { padding:6px 10px; font-size:12px; }
  .btn-danger { background:#fff; color:var(--red); border:1px solid var(--red); }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .field-label { font-family:var(--mono); font-size:10px; color:var(--ink-soft); display:block; margin-bottom:3px; letter-spacing:.04em; }
  input[type=text],input[type=number],input[type=date],select,textarea {
    width:100%; box-sizing:border-box; font-family:var(--mono); font-size:13px; padding:8px 9px;
    border:1px solid var(--paper-dark); border-radius:6px; color:var(--text); background:#fff; margin-bottom:8px;
  }
  input:focus,select:focus,textarea:focus,button:focus-visible { outline:2px solid var(--ink); outline-offset:1px; }
  .card { background:#fff; border:1px solid var(--paper-dark); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
  .err-msg { font-size:12px; color:var(--red); margin:8px 0; }
  .ok-msg { font-size:12px; color:var(--green); margin:8px 0; }
  .chip { display:inline-block; font-family:var(--mono); font-size:10px; background:var(--paper-dark); color:var(--ink-soft); border-radius:4px; padding:2px 6px; margin:2px 4px 0 0; }
  .drop-zone { border:1px dashed var(--ink-soft); border-radius:10px; padding:26px 16px; text-align:center; margin-bottom:12px; }
  .receipt-line { display:flex; justify-content:space-between; font-family:var(--mono); font-size:12px; padding:2px 0; }
  .receipt-line span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:65%; }
  .receipt-total { display:flex; justify-content:space-between; font-family:var(--mono); font-size:12px; font-weight:700; color:var(--ink); border-top:1px dashed var(--paper-dark); margin-top:6px; padding-top:6px; }
  .product-row { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; cursor:pointer; }
  .product-name { font-size:13px; font-weight:500; }
  .product-meta { font-family:var(--mono); font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .ref-tag { font-family:var(--mono); font-size:9px; color:var(--ink-soft); background:var(--paper-dark); border-radius:4px; padding:1px 5px; margin-left:6px; }
  .chart-box { background:#fff; border:1px solid var(--paper-dark); border-radius:10px; padding:16px 8px 8px; }
  .toggle-group { display:flex; gap:6px; margin-bottom:12px; }
  .toggle-btn { flex:1; padding:8px; border-radius:6px; border:1px solid var(--paper-dark); background:#fff; font-family:var(--mono); font-size:11px; color:var(--ink-soft); cursor:pointer; }
  .toggle-btn.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .supplier-check { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; border-bottom:1px solid var(--paper-dark); }
  .supplier-check input { width:16px; height:16px; accent-color:var(--ink); }
  .back-link { background:none; border:none; color:var(--ink-soft); font-size:13px; padding:4px 0 12px; display:flex; align-items:center; gap:4px; cursor:pointer; }
  nav.bottomnav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--paper-dark); display:flex; padding-bottom:env(safe-area-inset-bottom,0px); max-width:560px; margin:0 auto; }
  nav.bottomnav button { flex:1; background:none; border:none; padding:9px 0 7px; display:flex; flex-direction:column; align-items:center; gap:2px; color:#9C9A92; cursor:pointer; }
  nav.bottomnav button.active { color:var(--ink); }
  nav.bottomnav span { font-family:var(--mono); font-size:8px; letter-spacing:.03em; }
  .checkbox-row { display:flex; align-items:center; gap:8px; }
  .checkbox-row input { width:16px; height:16px; accent-color:var(--ink); }
</style>

<script>

const ICON = {

  download:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
};

function fmtEUR(n){ if(n===null||n===undefined||isNaN(n)) return "—"; return Number(n).toFixed(2).replace(".",",")+" €"; }
function fmtDate(iso){ if(!iso) return "?"; const d=new Date(iso); if(isNaN(d.getTime())) return iso; return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"2-digit"}); }
function refPrice(a){ if(a.poids && a.prix_kg) return {value:Number(a.prix_kg), unit:"/kg"}; return {value:Number(a.prix_unitaire), unit:"/u"}; }
function uid(){ return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let state = {
  tab: "import",
  achats: [], produits: [], fournisseurs: [], groupes: [],
  loaded: false,
  csvErr: "", csvOk: "",
  produitsEdit: {}, mergeSelection: new Set(),
  newFournisseur: {code:"", nom:"", groupe:""},
  newGroupe: {code:"", nom:""},
  evoMode: "article",
  evoArticle: null, evoGroupe: null, evoManual: new Set(),
  evoFournisseurs: new Set(),
  productDetail: null
};

async function loadAll(){
  if(!sb){ state.loaded=true; render(); return; }
  const [a,p,f,g] = await Promise.all([
    sb.from("achats").select("*").order("date_achat",{ascending:true}),
    sb.from("produits").select("*"),
    sb.from("fournisseurs").select("*"),
    sb.from("groupes_articles").select("*")
  ]);
  state.achats = a.data || [];
  state.produits = p.data || [];
  state.fournisseurs = f.data || [];
  state.groupes = g.data || [];
  state.loaded = true;
  render();
}

// ---------- CSV import ----------
function downloadTemplate(){
  const headers = ["date_achat","code_fournisseur","article","quantite","poids","prix_kg","prix_unitaire","facture"];
  const example = ["2026-07-19","MARKET_SAINT_MARCEL","425G KRISPROLLS DO","1","","","3,75","3,75"];
  const csv = headers.join(";") + "\n" + example.join(";") + "\n";
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url; link.download = "modele_achats.csv";
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function parseNum(s){
  if(s===undefined||s===null) return null;
  s = String(s).trim().replace(",",".");
  if(s==="") return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

async function handleCsvFile(file){
  state.csvErr = ""; state.csvOk = "";
  render();
  try {
    const text = await file.text();
    const clean = text.replace(/^\uFEFF/, "");
    const lines = clean.split(/\r?\n/).filter(l => l.trim() !== "");
    if(lines.length < 2) throw new Error("Fichier vide ou sans données.");
    const header = lines[0].split(";").map(h => h.trim().toLowerCase().replace(/^"|"$/g,""));
    const rows = lines.slice(1).map(line => {
      const cells = line.split(";");
      const obj = {};
      header.forEach((h,i) => { obj[h] = (cells[i]||"").trim().replace(/^"|"$/g,""); });
      return obj;
    }).filter(r => r.article);

    if(rows.length === 0) throw new Error("Aucune ligne d'article détectée.");

    // group rows by (date_achat, code_fournisseur) -> one receipt_id per group
    const groups = {};
    rows.forEach(r => {
      const key = (r.date_achat||"") + "|" + (r.code_fournisseur||"");
      if(!groups[key]) groups[key] = uid();
    });

    // resolve/create fournisseurs
    const fournisseurCodes = [...new Set(rows.map(r => r.code_fournisseur).filter(Boolean))];
    const existingFournisseurs = new Set(state.fournisseurs.map(f => f.code_fournisseur));
    const newFournisseurs = fournisseurCodes.filter(c => !existingFournisseurs.has(c))
      .map(c => ({code_fournisseur:c, nom_fournisseur:c}));
    if(newFournisseurs.length){
      const {error} = await sb.from("fournisseurs").insert(newFournisseurs);
      if(error) throw new Error("fournisseurs: " + error.message);
    }

    // resolve/create produits (by libelle_facture)
    const articleLabels = [...new Set(rows.map(r => r.article).filter(Boolean))];
    const existingLabels = new Set(state.produits.map(p => p.libelle_facture));
    const newProduits = articleLabels.filter(a => !existingLabels.has(a))
      .map(a => ({code_article:a, libelle_facture:a}));
    if(newProduits.length){
      const {error} = await sb.from("produits").insert(newProduits);
      if(error) throw new Error("produits: " + error.message);
    }

    // build label -> code_article map (existing + just-inserted)
    const labelToCode = {};
    state.produits.forEach(p => { labelToCode[p.libelle_facture] = p.code_article; });
    newProduits.forEach(p => { labelToCode[p.libelle_facture] = p.code_article; });

    const payload = rows.map(r => {
      const key = (r.date_achat||"") + "|" + (r.code_fournisseur||"");
      return {
        receipt_id: groups[key],
        date_achat: r.date_achat || null,
        code_fournisseur: r.code_fournisseur || null,
        code_article: labelToCode[r.article] || r.article,
        quantite: parseNum(r.quantite) ?? 1,
        poids: parseNum(r.poids),
        prix_kg: parseNum(r.prix_kg),
        prix_unitaire: parseNum(r.prix_unitaire),
        facture: parseNum(r.facture) ?? 0
      };
    });

    const missingDate = payload.some(p => !p.date_achat);
    const missingFourn = payload.some(p => !p.code_fournisseur);
    if(missingDate) throw new Error("Une ou plusieurs lignes n'ont pas de date_achat.");
    if(missingFourn) throw new Error("Une ou plusieurs lignes n'ont pas de code_fournisseur.");

    const {error: insErr} = await sb.from("achats").insert(payload);
    if(insErr) throw new Error("achats: " + insErr.message);

    state.csvOk = payload.length + " ligne(s) importée(s) avec succès.";
    await loadAll();
  } catch(err){
    console.error(err);
    state.csvErr = "Échec de l'import. Détail : " + (err.message || String(err));
    render();
  }
}

// ---------- Produits: grouping, edit, merge ----------
function produitsGroupedByCode(){
  const map = {};
  state.produits.forEach(p => {
    if(!map[p.code_article]) map[p.code_article] = {code_article:p.code_article, libelle_complet:null, code_groupe:null, aliases:[]};
    map[p.code_article].aliases.push(p.libelle_facture);
    if(p.libelle_complet && !map[p.code_article].libelle_complet) map[p.code_article].libelle_complet = p.libelle_complet;
    if(p.code_groupe && !map[p.code_article].code_groupe) map[p.code_article].code_groupe = p.code_groupe;
  });
  Object.values(map).forEach(g => {
    const hist = state.achats.filter(a => a.code_article === g.code_article)
      .map(a => ({date:a.date_achat, ...refPrice(a), fournisseur:a.code_fournisseur}))
      .sort((x,y) => (x.date||"").localeCompare(y.date||""));
    g.history = hist;
    g.last = hist[hist.length-1] || null;
  });
  return map;
}

async function saveProduitMeta(code_article, libelle_complet, code_groupe){
  const {error} = await sb.from("produits").update({libelle_complet, code_groupe: code_groupe||null}).eq("code_article", code_article);
  if(error){ alert("Erreur: " + error.message); return; }
  await loadAll();
}

async function mergeSelected(){
  const codes = Array.from(state.mergeSelection);
  if(codes.length < 2) return;
  const target = codes[0];
  const others = codes.slice(1);
  const {error:e1} = await sb.from("produits").update({code_article: target}).in("code_article", others);
  const {error:e2} = await sb.from("achats").update({code_article: target}).in("code_article", others);
  if(e1 || e2){ alert("Erreur fusion: " + ((e1&&e1.message)||(e2&&e2.message))); return; }
  state.mergeSelection = new Set();
  await loadAll();
}

// ---------- Fournisseurs ----------
async function addFournisseur(){

  if(!f.code.trim() || !f.nom.trim()) return;

  if(error){ alert("Erreur: " + error.message); return; }
  state.newFournisseur = {code:"", nom:"", groupe:""};
  await loadAll();
}
async function updateFournisseur(code, field, value){
  const {error} = await sb.from("fournisseurs").update({[field]: value || null}).eq("code_fournisseur", code);
  if(error){ alert("Erreur: " + error.message); return; }

// ---------- Groupes ----------
async function addGroupe(){
  const g = state.newGroupe;

// ---------- Evolution charts ----------
function achatsFiltered(codeArticles){
  const supplierFilter = state.evoFournisseurs.size > 0 ? state.evoFournisseurs : null;
  return state.achats.filter(a =>
    codeArticles.has(a.code_article) &&
    (!supplierFilter || supplierFilter.has(a.code_fournisseur))
  );
}

function seriesForArticle(code){
  const rows = achatsFiltered(new Set([code])).sort((a,b)=>(a.date_achat||"").localeCompare(b.date_achat||""));
  return rows.map(a => ({date: fmtDate(a.date_achat), raw:a.date_achat, ...refPrice(a)}));
}

function seriesForGroup(codes){
  const set = new Set(codes);
  const rows = achatsFiltered(set);
  const perArticle = {};
  rows.forEach(a => {
    if(!perArticle[a.code_article]) perArticle[a.code_article] = [];
    perArticle[a.code_article].push({date:a.date_achat, ...refPrice(a)});
  });
  Object.values(perArticle).forEach(arr => arr.sort((x,y)=>(x.date||"").localeCompare(y.date||"")));
  const allDates = [...new Set(rows.map(a=>a.date_achat))].sort();
  const last = {};
  const out = [];
  allDates.forEach(date => {
    codes.forEach(code => {
      const hit = (perArticle[code]||[]).find(h => h.date === date);
      if(hit) last[code] = hit.value;
    });
    if(codes.every(c => last[c] !== undefined)){
      const total = codes.reduce((s,c)=> s + last[c], 0);
      out.push({date: fmtDate(date), value: total});
    }
  });
  return out;
}

function lineChartSVG(data, key){
  const w=320,h=200,padL=42,padR=16,padT=14,padB=22;
  if(data.length===0) return "";
  const vals = data.map(d=>d[key]);
  const min=Math.min(...vals), max=Math.max(...vals), range=(max-min)||1;
  const yFor = v => padT + (h-padT-padB) * (1-(v-min)/range);
  const xFor = i => padL + (w-padL-padR) * (data.length>1 ? i/(data.length-1) : 0.5);
  const pts = data.map((d,i)=>`${xFor(i)},${yFor(d[key])}`).join(" ");
  let grid="";
  for(let s=0;s<=4;s++){ const v=min+(range*s)/4; const y=yFor(v);
    grid += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--paper-dark)" stroke-width="1"/><text x="${padL-6}" y="${y+3}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)" text-anchor="end">${v.toFixed(2)}</text>`; }
  let xl="";
  data.forEach((d,i)=>{ if(i===0||i===data.length-1||data.length<=5) xl += `<text x="${xFor(i)}" y="${h-6}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)" text-anchor="middle">${d.date}</text>`; });
  let dots="";
  data.forEach((d,i)=>{ dots += `<circle cx="${xFor(i)}" cy="${yFor(d[key])}" r="3" fill="var(--ink)"/>`; });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">${grid}<polyline points="${pts}" fill="none" stroke="var(--ink)" stroke-width="2"/>${dots}${xl}</svg>`;
}

// ---------- Render ----------
function render(){
  const app = document.getElementById("app");
  let html = `<header class="topbar"><div class="title">SUIVI PRIX</div></header>`;
  if(needsSetup) html += `<div class="setup-banner">Configuration Supabase manquante.</div>`;
  html += `<div class="tab-content">`;
  if(!state.loaded){ /* wait */ }
  else if(state.tab==="import") html += renderImport();
  else if(state.tab==="produits") html += renderProduits();
  else if(state.tab==="produit-detail") html += renderProduitDetail();
  else if(state.tab==="fournisseurs") html += renderFournisseurs();
  else if(state.tab==="evolution") html += renderEvolution();
  else if(state.tab==="historique") html += renderHistorique();
  html += `</div>`;
  html += `<nav class="bottomnav">
    <button class="${state.tab==='import'?'active':''}" onclick="switchTab('import')">${ICON.upload}<span>IMPORT</span></button>
    <button class="${state.tab==='produits'||state.tab==='produit-detail'?'active':''}" onclick="switchTab('produits')">${ICON.box}<span>PRODUITS</span></button>
    <button class="${state.tab==='fournisseurs'?'active':''}" onclick="switchTab('fournisseurs')">${ICON.store}<span>FOURNISS.</span></button>
    <button class="${state.tab==='evolution'?'active':''}" onclick="switchTab('evolution')">${ICON.trend}<span>ÉVOLUTION</span></button>
    <button class="${state.tab==='historique'?'active':''}" onclick="switchTab('historique')">${ICON.clock}<span>HISTORIQUE</span></button>
  </nav>`;
  app.innerHTML = html;
}

function switchTab(t){ state.tab=t; render(); }

function renderImport(){
  return `
    <div class="helper-text">
      1. Télécharge le modèle CSV.<br>
      2. Remplis-le dans ton tableur (une ligne par article, plusieurs tickets possibles dans le même fichier).<br>
      3. Réimporte-le ci-dessous.
    </div>
    <button class="btn btn-secondary" style="width:100%;margin-bottom:14px;" onclick="downloadTemplate()">${ICON.download} Télécharger le modèle CSV</button>
    <div class="drop-zone">
      <div style="margin-bottom:10px;">${ICON.upload}</div>
      <input type="file" accept=".csv" id="csv-input" style="position:absolute;width:1px;height:1px;opacity:0;" onchange="handleCsvFile(this.files[0])">
      <button class="btn btn-primary" onclick="document.getElementById('csv-input').click()">Choisir le fichier rempli</button>
    </div>
    ${state.csvErr ? `<div class="err-msg">${esc(state.csvErr)}</div>` : ""}
    ${state.csvOk ? `<div class="ok-msg">${esc(state.csvOk)}</div>` : ""}
    <div class="section-label">CODES FOURNISSEURS DISPONIBLES</div>
    ${state.fournisseurs.length ? state.fournisseurs.map(f=>`<span class="chip">${esc(f.code_fournisseur)}</span>`).join("") : `<div class="helper-text">Aucun pour l'instant — l'import en créera automatiquement si besoin, à renommer ensuite dans l'onglet Fournisseurs.</div>`}
  `;
}

function renderProduits(){
  const grouped = produitsGroupedByCode();
  const codes = Object.keys(grouped).sort((a,b)=>{
    const da = grouped[a].last ? grouped[a].last.date : "";
    const db = grouped[b].last ? grouped[b].last.date : "";
    return (db||"").localeCompare(da||"");
  });
  if(codes.length===0) return `<div class="empty-state">Importe des achats pour voir tes produits ici.</div>`;
  let html = "";
  if(state.mergeSelection.size >= 2){
    html += `<div class="card"><div class="helper-text">${state.mergeSelection.size} articles sélectionnés — ils seront fusionnés sous le code <b>${esc(Array.from(state.mergeSelection)[0])}</b>.</div>
      <div class="row"><button class="btn btn-secondary" onclick="state.mergeSelection=new Set();render();">Annuler</button><button class="btn btn-primary" onclick="mergeSelected()">Fusionner</button></div></div>`;
  }
  codes.forEach(code => {
    const g = grouped[code];
    const checked = state.mergeSelection.has(code) ? "checked" : "";
    html += `<div class="card">
      <div class="checkbox-row" style="margin-bottom:6px;">
        <input type="checkbox" ${checked} onchange="toggleMerge('${esc(code)}', this.checked)">
        <div class="product-row" style="flex:1;" onclick="openProduit('${esc(code)}')">
          <div>
            <div class="product-name">${esc(g.libelle_complet || g.aliases[0])}</div>
            <div class="product-meta">${g.aliases.length} libellé(s) · ${g.history.length} achat(s)${g.last ? " · dernier le "+fmtDate(g.last.date) : ""}</div>
          </div>
          <div style="font-family:var(--mono); font-size:13px; font-weight:700; color:var(--ink);">${g.last ? fmtEUR(g.last.value)+`<span class="ref-tag">${g.last.unit}</span>` : "—"}</div>
        </div>
      </div>
    </div>`;
  });
  return html;
}

function toggleMerge(code, checked){
  if(checked) state.mergeSelection.add(code); else state.mergeSelection.delete(code);
  render();
}

function openProduit(code){ state.productDetail = code; state.tab = "produit-detail"; render(); }

function renderProduitDetail(){
  const grouped = produitsGroupedByCode();
  const g = grouped[state.productDetail];
  if(!g) return `<div class="empty-state">Introuvable.</div>`;
  const first = g.history[0], last = g.history[g.history.length-1];
  let deltaHtml = "";
  if(first && last && first !== last){
    const delta = last.value - first.value;
    const pct = first.value ? (delta/first.value*100) : 0;
    const color = delta>0 ? "var(--red)" : delta<0 ? "var(--green)" : "var(--ink-soft)";
    deltaHtml = `<div style="font-family:var(--mono); font-size:12px; color:${color}; margin-bottom:14px;">${delta===0?"stable":(delta>0?"+":"")+delta.toFixed(2)+" € ("+(pct>0?"+":"")+pct.toFixed(1)+"%) depuis le premier achat"}</div>`;
  }
  const groupeOptions = state.groupes.map(gr => `<option value="${esc(gr.code_groupe)}" ${g.code_groupe===gr.code_groupe?"selected":""}>${esc(gr.nom_groupe)}</option>`).join("");
  return `
    <button class="back-link" onclick="switchTab('produits')">${ICON.back} Tous les produits</button>
    <div class="section-label">LIBELLÉ COMPLET</div>
    <input type="text" id="libelle-complet-input" value="${esc(g.libelle_complet||"")}" placeholder="Nom convivial (optionnel)">
    <div class="section-label">GROUPE</div>
    <select id="groupe-select"><option value="">— aucun —</option>${groupeOptions}</select>
    <button class="btn btn-secondary" style="width:100%;margin-bottom:14px;" onclick="saveProduitMeta('${esc(g.code_article)}', document.getElementById('libelle-complet-input').value, document.getElementById('groupe-select').value)">Enregistrer</button>
    <div class="section-label">LIBELLÉS SOURCE (${g.aliases.length})</div>
    ${g.aliases.map(a=>`<span class="chip">${esc(a)}</span>`).join("")}
    ${deltaHtml}
    ${g.history.length ? `<div class="chart-box">${lineChartSVG(g.history.map(h=>({date:fmtDate(h.date),v:h.value})), "v")}</div>` : ""}
    <div class="section-label">HISTORIQUE</div>
    ${g.history.slice().reverse().map(h=>`<div class="receipt-line"><span>${fmtDate(h.date)} · ${esc(h.fournisseur||"")}</span><span>${fmtEUR(h.value)}<span class="ref-tag">${h.unit}</span></span></div>`).join("")}
  `;
}

function renderFournisseurs(){
  let html = `<div class="section-label">AJOUTER UN FOURNISSEUR</div>
    <div class="row">
      <input type="text" placeholder="Code" value="${esc(state.newFournisseur.code)}" oninput="state.newFournisseur.code=this.value">
      <input type="text" placeholder="Nom" value="${esc(state.newFournisseur.nom)}" oninput="state.newFournisseur.nom=this.value">
    </div>
    <input type="text" placeholder="Groupe (optionnel)" value="${esc(state.newFournisseur.groupe)}" oninput="state.newFournisseur.groupe=this.value">
    <button class="btn btn-primary" style="width:100%;margin-bottom:16px;" onclick="addFournisseur()">${ICON.plus} Ajouter</button>
    <div class="section-label">FOURNISSEURS (${state.fournisseurs.length})</div>`;
  state.fournisseurs.forEach(f => {
    html += `<div class="card">
      <div class="field-label">CODE: ${esc(f.code_fournisseur)}</div>
      <input type="text" value="${esc(f.nom_fournisseur)}" onchange="updateFournisseur('${esc(f.code_fournisseur)}','nom_fournisseur',this.value)">
      <input type="text" placeholder="Groupe" value="${esc(f.groupe_fournisseur||"")}" onchange="updateFournisseur('${esc(f.code_fournisseur)}','groupe_fournisseur',this.value)">
    </div>`;
  });
  html += `<div class="section-label">GROUPES D'ARTICLES</div>
    <div class="row">
      <input type="text" placeholder="Code" value="${esc(state.newGroupe.code)}" oninput="state.newGroupe.code=this.value">
      <input type="text" placeholder="Nom" value="${esc(state.newGroupe.nom)}" oninput="state.newGroupe.nom=this.value">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:12px;" onclick="addGroupe()">${ICON.plus} Ajouter un groupe</button>
    ${state.groupes.map(g=>`<span class="chip">${esc(g.nom_groupe)}</span>`).join("")}
  `;
  return html;
}

function renderEvolution(){
  const grouped = produitsGroupedByCode();
  const articleOptions = Object.keys(grouped).sort().map(code =>
    `<option value="${esc(code)}" ${state.evoArticle===code?"selected":""}>${esc(grouped[code].libelle_complet||grouped[code].aliases[0])}</option>`
  ).join("");
  const groupeOptions = state.groupes.map(g =>
    `<option value="${esc(g.code_groupe)}" ${state.evoGroupe===g.code_groupe?"selected":""}>${esc(g.nom_groupe)}</option>`
  ).join("");

  let html = `<div class="toggle-group">
    <button class="toggle-btn ${state.evoMode==='article'?'active':''}" onclick="setEvoMode('article')">PAR ARTICLE</button>
    <button class="toggle-btn ${state.evoMode==='groupe'?'active':''}" onclick="setEvoMode('groupe')">PAR GROUPE</button>
  </div>`;

  if(state.evoMode === "article"){
    html += `<div class="section-label">ARTICLE</div><select onchange="state.evoArticle=this.value; render();"><option value="">— choisir —</option>${articleOptions}</select>`;
  } else {
    html += `<div class="section-label">GROUPE</div><select onchange="state.evoGroupe=this.value; render();"><option value="">— choisir —</option>${groupeOptions}</select>`;
  }

  html += `<div class="section-label">FOURNISSEURS (vide = tous)</div>`;
  state.fournisseurs.forEach(f => {
    const checked = state.evoFournisseurs.has(f.code_fournisseur) ? "checked" : "";
    html += `<label class="supplier-check"><input type="checkbox" ${checked} onchange="toggleEvoFournisseur('${esc(f.code_fournisseur)}', this.checked)">${esc(f.nom_fournisseur)}</label>`;
  });

  let chartData = [], deltaHtml = "";
  if(state.evoMode === "article" && state.evoArticle){
    chartData = seriesForArticle(state.evoArticle);
    if(chartData.length){
      const first=chartData[0], last=chartData[chartData.length-1];
      const delta = last.value - first.value; const pct = first.value ? (delta/first.value*100):0;
      const color = delta>0?"var(--red)":delta<0?"var(--green)":"var(--ink-soft)";
      deltaHtml = `<div style="font-family:var(--mono); font-size:12px; color:${color}; margin:12px 0;">${delta===0?"stable":(delta>0?"+":"")+delta.toFixed(2)+" € ("+(pct>0?"+":"")+pct.toFixed(1)+"%)"}</div>`;
      html += deltaHtml + `<div class="chart-box">${lineChartSVG(chartData,"value")}</div>`;
    } else if(state.evoArticle){
      html += `<div class="empty-state">Pas de données pour ce filtre.</div>`;
    }
  } else if(state.evoMode === "groupe" && state.evoGroupe){
    const codes = Object.keys(grouped).filter(c => grouped[c].code_groupe === state.evoGroupe);
    chartData = seriesForGroup(codes);
    if(chartData.length){
      const first=chartData[0], last=chartData[chartData.length-1];
      const delta = last.value - first.value; const pct = first.value ? (delta/first.value*100):0;
      const color = delta>0?"var(--red)":delta<0?"var(--green)":"var(--ink-soft)";
      deltaHtml = `<div style="font-family:var(--mono); font-size:12px; color:${color}; margin:12px 0;">Panier du groupe : ${delta===0?"stable":(delta>0?"+":"")+delta.toFixed(2)+" € ("+(pct>0?"+":"")+pct.toFixed(1)+"%)"}</div>`;
      html += deltaHtml + `<div class="chart-box">${lineChartSVG(chartData,"value")}</div>`;
    } else {
      html += `<div class="empty-state">Pas assez de dates communes entre les articles du groupe.</div>`;
    }
  }
  return html;
}

function setEvoMode(m){ state.evoMode=m; render(); }
function toggleEvoFournisseur(code, checked){
  if(checked) state.evoFournisseurs.add(code); else state.evoFournisseurs.delete(code);
  render();
}

function renderHistorique(){
  if(state.achats.length===0) return `<div class="empty-state">Aucun achat enregistré pour l'instant.</div>`;
  const grouped = produitsGroupedByCode();
  const byReceipt = {};
  state.achats.forEach(a => {
    const key = a.receipt_id || (a.date_achat+"|"+a.code_fournisseur);
    if(!byReceipt[key]) byReceipt[key] = {date:a.date_achat, fournisseur:a.code_fournisseur, items:[]};
    byReceipt[key].items.push(a);
  });
  const receipts = Object.entries(byReceipt).sort((a,b)=>(b[1].date||"").localeCompare(a[1].date||""));
  let html = "";
  receipts.forEach(([key,r]) => {
    const fournisseurNom = (state.fournisseurs.find(f=>f.code_fournisseur===r.fournisseur)||{}).nom_fournisseur || r.fournisseur;
    const total = r.items.reduce((s,a)=>s+(Number(a.facture)||0),0);
    let lines = "";
    r.items.forEach(a => {
      const g = grouped[a.code_article];
      const label = g ? (g.libelle_complet || g.aliases[0]) : a.code_article;
      lines += `<div class="receipt-line"><span>${a.quantite>1?a.quantite+"x ":""}${esc(label)}</span><span>${fmtEUR(a.facture)}</span></div>`;
    });
    html += `<div class="card">
      <div class="field-label">${fmtDate(r.date)} · ${esc(fournisseurNom)}</div>
      ${lines}
      <div class="receipt-total"><span>TOTAL</span><span>${fmtEUR(total)}</span></div>
    </div>`;
  });
  return html;
}

render();
loadAll();
</script>
</body>
</html>
