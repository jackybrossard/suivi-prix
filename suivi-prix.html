function fmtEUR(n){ if(n===null||n===undefined||isNaN(n)) return "—"; return Number(n).toFixed(2).replace(".",",")+" €"; }
function fmtDateFR(iso){ if(!iso) return "?"; const p=String(iso).split("-"); if(p.length!==3) return iso; return `${p[2]}/${p[1]}/${p[0]}`; }
function fmtDateShort(iso){ if(!iso) return "?"; const p=String(iso).split("-"); if(p.length!==3) return iso; return `${p[2]}/${p[1]}`; }
function parseDateInput(s){
  s = (s||"").trim();
  if(!s) return null;
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return null;
}
function refPrice(a){ if(a.poids && a.prix_kg) return {value:Number(a.prix_kg), unit:"/kg"}; return {value:Number(a.prix_unitaire), unit:"/u"}; }
function uid(){ return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function scrollTop(){ window.scrollTo({top:0, behavior:"smooth"}); }
function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url; link.download = filename;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function downloadTemplate(){

function parseNum(s){
  if(s===undefined||s===null) return null;
  s = String(s).trim().replace(",",".");
  if(s==="") return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

async function handleCsvFile(file){
  state.csvErr = ""; state.csvOk = "";
  render();
  try {
    const text = await file.text();
    const clean = text.replace(/^\uFEFF/, "");
    const lines = clean.split(/\r?\n/).filter(l => l.trim() !== "");
    if(lines.length < 2) throw new Error("Fichier vide ou sans données.");
    const header = lines[0].split(";").map(h => h.trim().toLowerCase().replace(/^"|"$/g,""));
    const rows = lines.slice(1).map(line => {
      const cells = line.split(";");
      const obj = {};
      header.forEach((h,i) => { obj[h] = (cells[i]||"").trim().replace(/^"|"$/g,""); });
      return obj;
    }).filter(r => r.article);

    if(rows.length === 0) throw new Error("Aucune ligne d'article détectée.");

    const parsedDates = {};
    rows.forEach(r => { parsedDates[r.date_achat] = parseDateInput(r.date_achat); });
    const badDate = Object.entries(parsedDates).find(([k,v]) => k && !v);
    if(badDate) throw new Error(`Date illisible : "${badDate[0]}". Utilise JJ/MM/AAAA ou AAAA-MM-JJ.`);

    const groups = {};
    rows.forEach(r => {
      const key = r.date_achat + "|" + r.code_fournisseur;
      if(!groups[key]) groups[key] = uid();
    });

    const fournisseurCodes = [...new Set(rows.map(r => r.code_fournisseur).filter(Boolean))];
    const existingFournisseurs = new Set(state.fournisseurs.map(f => f.code_fournisseur));
    const newFournisseurs = fournisseurCodes.filter(c => !existingFournisseurs.has(c))
      .map(c => ({code_fournisseur:c, nom_fournisseur:c}));
    if(newFournisseurs.length){
      const {error} = await sb.from("fournisseurs").insert(newFournisseurs);
      if(error) throw new Error("fournisseurs: " + error.message);
    }

    const articleLabels = [...new Set(rows.map(r => r.article).filter(Boolean))];
    const existingLabels = new Set(state.produits.map(p => p.libelle_facture));
    const newProduits = articleLabels.filter(a => !existingLabels.has(a))
      .map(a => ({code_article:a, libelle_facture:a}));
    if(newProduits.length){
      const {error} = await sb.from("produits").insert(newProduits);
      if(error) throw new Error("produits: " + error.message);
    }

    const labelToCode = {};
    state.produits.forEach(p => { labelToCode[p.libelle_facture] = p.code_article; });
    newProduits.forEach(p => { labelToCode[p.libelle_facture] = p.code_article; });

    const payload = rows.map(r => {
      const key = r.date_achat + "|" + r.code_fournisseur;
      return {
        receipt_id: groups[key],
        date_achat: parsedDates[r.date_achat],
        code_fournisseur: r.code_fournisseur || null,
        code_article: labelToCode[r.article] || r.article,
        quantite: parseNum(r.quantite) ?? 1,
        poids: parseNum(r.poids),
        prix_kg: parseNum(r.prix_kg),
        prix_unitaire: parseNum(r.prix_unitaire),
        facture: parseNum(r.facture) ?? 0
      };
    });

    if(payload.some(p => !p.date_achat)) throw new Error("Une ou plusieurs lignes n'ont pas de date_achat valide.");
    if(payload.some(p => !p.code_fournisseur)) throw new Error("Une ou plusieurs lignes n'ont pas de code_fournisseur.");

    const {error: insErr} = await sb.from("achats").insert(payload);
    if(insErr) throw new Error("achats: " + insErr.message);

    state.csvOk = payload.length + " ligne(s) importée(s) avec succès.";
    await loadAll();
  } catch(err){
    console.error(err);
    state.csvErr = "Échec de l'import. Détail : " + (err.message || String(err));
    render();
  }
}

// ---------- Produits ----------
function produitsGroupedByCode(){
  const map = {};
  state.produits.forEach(p => {
    if(!map[p.code_article]) map[p.code_article] = {code_article:p.code_article, libelle_complet:null, code_groupe:null, aliases:[]};
    map[p.code_article].aliases.push({id:p.id, libelle_facture:p.libelle_facture});
    if(p.libelle_complet && !map[p.code_article].libelle_complet) map[p.code_article].libelle_complet = p.libelle_complet;
    if(p.code_groupe && !map[p.code_article].code_groupe) map[p.code_article].code_groupe = p.code_groupe;
  });
  Object.values(map).forEach(g => {
    const hist = state.achats.filter(a => a.code_article === g.code_article)
      .map(a => ({date:a.date_achat, ...refPrice(a), fournisseur:a.code_fournisseur}))
      .sort((x,y) => (x.date||"").localeCompare(y.date||""));
    g.history = hist;
    g.first = hist[0] || null;
    g.last = hist[hist.length-1] || null;
    g.displayName = g.libelle_complet || g.aliases[0].libelle_facture;
  });
  return map;
}

async function mergeSelected(){
  const codes = Array.from(state.mergeSelection);
  if(codes.length < 2) return;
  const target = codes[0];
  const others = codes.slice(1);
  const {error:e1} = await sb.from("produits").update({code_article: target}).in("code_article", others);
  const {error:e2} = await sb.from("achats").update({code_article: target}).in("code_article", others);
  if(e1 || e2){ alert("Erreur fusion: " + ((e1&&e1.message)||(e2&&e2.message))); return; }
  state.mergeSelection = new Set();
  await loadAll();
}

async function deleteFournisseur(code){

// ---------- Backup ----------
async function backupNow(){
  const payload = {
    exported_at: new Date().toISOString(),
    achats: state.achats, produits: state.produits,
    fournisseurs: state.fournisseurs, groupes_articles: state.groupes
  };
  downloadBlob(JSON.stringify(payload, null, 2), `suivi-prix-backup-${new Date().toISOString().slice(0,10)}.json`, "application/json");
  const now = new Date().toISOString();
  let lastErr = null;
  for(let attempt=0; attempt<2; attempt++){
    const {error} = await sb.from("config").upsert({key:"last_backup", value:now}, {onConflict:"key"});
    if(!error){ state.lastBackupAt = now; render(); return; }
    lastErr = error;
    await new Promise(r => setTimeout(r, 800));
  }
  console.error(lastErr);
  alert("Fichier téléchargé. La date de dernière sauvegarde n'a pas pu être mise à jour (problème réseau passager) — réessaie depuis Paramètres un peu plus tard, ce n'est pas grave si le fichier est déjà en sécurité chez toi.");
}
function daysSinceBackup(){
  if(!state.lastBackupAt) return Infinity;
  return (Date.now() - new Date(state.lastBackupAt).getTime()) / 86400000;
}

function seriesForArticleCodes(codes, filterSet){
  const set = new Set(codes);
  const rows = state.achats.filter(a => set.has(a.code_article) && (filterSet.size===0 || filterSet.has(a.code_fournisseur)));
  const perArticle = {};
  rows.forEach(a => {
    if(!perArticle[a.code_article]) perArticle[a.code_article] = [];
    perArticle[a.code_article].push({date:a.date_achat, ...refPrice(a)});
  });
  Object.values(perArticle).forEach(arr => arr.sort((x,y)=>(x.date||"").localeCompare(y.date||"")));
  const allDates = [...new Set(rows.map(a=>a.date_achat))].sort();
  const last = {};
  const out = [];
  allDates.forEach(date => {
    codes.forEach(code => {
      const hit = (perArticle[code]||[]).find(h => h.date === date);
      if(hit) last[code] = hit.value;
    });
    if(codes.every(c => last[c] !== undefined)){
      const total = codes.reduce((s,c)=> s + last[c], 0);
      out.push({date: fmtDateShort(date), value: total});
    }
  });
  return out;
}


function lineChartSVG(data, key){
  const w=320,h=200,padL=42,padR=16,padT=14,padB=22;
  if(data.length===0) return "";
  const vals = data.map(d=>d[key]);
  const min=Math.min(...vals), max=Math.max(...vals), range=(max-min)||1;
  const yFor = v => padT + (h-padT-padB) * (1-(v-min)/range);
  const xFor = i => padL + (w-padL-padR) * (data.length>1 ? i/(data.length-1) : 0.5);
  const pts = data.map((d,i)=>`${xFor(i)},${yFor(d[key])}`).join(" ");
  let grid="";
  for(let s=0;s<=4;s++){ const v=min+(range*s)/4; const y=yFor(v);
    grid += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--paper-dark)" stroke-width="1"/><text x="${padL-6}" y="${y+3}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)" text-anchor="end">${v.toFixed(2)}</text>`; }
  let xl="";
  data.forEach((d,i)=>{ if(i===0||i===data.length-1||data.length<=5) xl += `<text x="${xFor(i)}" y="${h-6}" font-family="var(--mono)" font-size="9" fill="var(--ink-soft)" text-anchor="middle">${d.date}</text>`; });
  let dots="";
  data.forEach((d,i)=>{ dots += `<circle cx="${xFor(i)}" cy="${yFor(d[key])}" r="3" fill="var(--ink)"/>`; });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">${grid}<polyline points="${pts}" fill="none" stroke="var(--ink)" stroke-width="2"/>${dots}${xl}</svg>`;
}

// ---------- Render ----------
function render(){
  const prevActive = document.activeElement;
  const prevId = (prevActive && prevActive.id) ? prevActive.id : null;
  const prevSelStart = prevActive ? prevActive.selectionStart : null;
  const prevSelEnd = prevActive ? prevActive.selectionEnd : null;
  const prevScrollY = window.scrollY;

  const app = document.getElementById("app");
  let html = `<header class="topbar"><div class="title">SUIVI PRIX</div></header>`;
  if(needsSetup) html += `<div class="setup-banner">Configuration Supabase manquante.</div>`;
  const dueDays = state.loaded ? daysSinceBackup() : 0;
  if(state.loaded && dueDays >= 8 && state.achats.length > 0){
    html += `<div class="reminder-banner"><span>${isFinite(dueDays) ? "Dernière sauvegarde il y a "+Math.floor(dueDays)+" jours." : "Aucune sauvegarde encore effectuée."} Pense à exporter tes données.</span><button class="btn btn-secondary btn-small" onclick="backupNow()">Sauvegarder</button></div>`;
  }
  html += `<div class="tab-content">`;
  if(!state.loaded){ /* wait */ }
  else if(state.tab==="produits") html += renderProduits();
  else if(state.tab==="produit-detail") html += renderProduitDetail();
  else if(state.tab==="historique") html += renderHistorique();
  else if(state.tab==="parametres") html += renderParametres();
  html += `</div>`;
  if(state.tab==="produits" || state.tab==="historique"){
    html += `<button class="totop-btn" onclick="scrollTop()">${ICON.up}</button>`;
  }
  html += `<nav class="bottomnav">
    <button class="${state.tab==='produits'||state.tab==='produit-detail'?'active':''}" onclick="switchTab('produits')">${ICON.box}<span>PRODUITS</span></button>
    <button class="${state.tab==='historique'?'active':''}" onclick="switchTab('historique')">${ICON.clock}<span>HISTORIQUE</span></button>
    <button class="${state.tab==='parametres'?'active':''}" onclick="switchTab('parametres')">${ICON.settings}<span>PARAMÈTRES</span></button>
  </nav>`;
  app.innerHTML = html;

  if(prevId){
    const el = document.getElementById(prevId);
    if(el){
      el.focus();
      if(typeof prevSelStart === "number" && el.setSelectionRange){
        try{ el.setSelectionRange(prevSelStart, prevSelEnd); }catch(e){}
      }
    }
  }
  window.scrollTo(0, prevScrollY);
}

function receiptsList(){
  const grouped = produitsGroupedByCode();
  const byReceipt = {};
  state.achats.forEach(a => {
    const key = a.receipt_id || (a.date_achat+"|"+a.code_fournisseur);
    if(!byReceipt[key]) byReceipt[key] = {key, date:a.date_achat, fournisseur:a.code_fournisseur, items:[]};
    byReceipt[key].items.push(a);
  });
  let list = Object.values(byReceipt);
  if(state.histSearchFournisseurs.size > 0) list = list.filter(r => state.histSearchFournisseurs.has(r.fournisseur));

  list.sort((a,b) => (b.date||"").localeCompare(a.date||""));
  return {list, grouped};
}

    <div class="row">
      <input type="text" placeholder="Code" value="${esc(state.newGroupe.code)}" oninput="state.newGroupe.code=this.value">
      <input type="text" placeholder="Nom (ex: Laitier)" value="${esc(state.newGroupe.nom)}" oninput="state.newGroupe.nom=this.value">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:14px;" onclick="addGroupe()">${ICON.plus} Ajouter un groupe</button>
    <input type="search" id="groupe-search-input" placeholder="Rechercher un groupe…" value="${esc(state.groupeSearch)}" oninput="state.groupeSearch=this.value; render();">
    ${filtered.length===0 ? `<div class="empty-state">Aucun groupe ${search?"pour cette recherche":"pour l'instant"}.</div>` : ""}
    ${filtered.map(g=>`<div class="card">
      <div class="row" style="align-items:center;">
        <div class="product-name" style="cursor:pointer;" onclick="openGroupeDetail('${esc(g.code_groupe)}')">${esc(g.nom_groupe)} <span class="field-label">(${esc(g.code_groupe)})</span></div>
        <button class="btn btn-danger btn-small" style="flex:0;" onclick="deleteGroupe('${esc(g.code_groupe)}')">${ICON.trash}</button>
      </div>
    </div>`).join("")}
  `;
}

function openGroupeDetail(code){ state.groupeDetail = code; state.groupeDetailFournisseurFilter = new Set(); render(); }

function renderGroupeDetail(){
  const groupe = state.groupes.find(g => g.code_groupe === state.groupeDetail);
  if(!groupe) return `<div class="empty-state">Introuvable.</div>`;
  const grouped = produitsGroupedByCode();
  const memberCodes = Object.keys(grouped).filter(c => grouped[c].code_groupe === groupe.code_groupe);
  let html = `<button class="back-link" onclick="state.groupeDetail=null; render();">${ICON.back} Tous les groupes</button>
    <div class="product-name" style="margin-bottom:10px;">${esc(groupe.nom_groupe)}</div>
    <div class="section-label">ARTICLES DU GROUPE (${memberCodes.length})</div>`;
  if(memberCodes.length===0){
    html += `<div class="empty-state">Aucun article assigné à ce groupe pour l'instant — fais-le depuis Paramètres → Produits & fusion.</div>`;
    return html;
  }
  html += memberCodes.map(c=>`<span class="chip">${esc(grouped[c].displayName)}</span>`).join("");
  html += renderFournisseurFilterUI(state.groupeDetailFournisseurFilter, "toggleGroupeDetailFournisseurFilter", "toggleGroupeDetailFournisseurGroupeFilter");
  const series = seriesForArticleCodes(memberCodes, state.groupeDetailFournisseurFilter);
  if(series.length){
    const first=series[0], last=series[series.length-1];
    const delta = last.value - first.value; const pct = first.value ? (delta/first.value*100):0;
    const color = delta>0?"var(--red)":delta<0?"var(--green)":"var(--ink-soft)";
    html += `<div style="font-family:var(--mono); font-size:12px; color:${color}; margin:12px 0;">Panier du groupe : ${delta===0?"stable":(delta>0?"+":"")+delta.toFixed(2)+" € ("+(pct>0?"+":"")+pct.toFixed(1)+"%)"}</div>`;
    html += `<div class="chart-box">${lineChartSVG(series,"value")}</div>`;
  } else {
    html += `<div class="empty-state">Pas assez de dates communes entre les articles du groupe pour ce filtre.</div>`;
  }
  return html;
}

function renderParamFournisseurs(){
  let html = `
    <div class="row">
      <input type="text" placeholder="Code" value="${esc(state.newFournisseur.code)}" oninput="state.newFournisseur.code=this.value">
      <input type="text" placeholder="Nom" value="${esc(state.newFournisseur.nom)}" oninput="state.newFournisseur.nom=this.value">
    </div>
    <input type="text" placeholder="Groupe (optionnel)" value="${esc(state.newFournisseur.groupe)}" oninput="state.newFournisseur.groupe=this.value">
    <button class="btn btn-primary" style="width:100%;margin-bottom:16px;" onclick="addFournisseur()">${ICON.plus} Ajouter</button>`;
  state.fournisseurs.forEach(f => {
    html += `<div class="card">
      <div class="field-label">CODE: ${esc(f.code_fournisseur)}</div>
      <input type="text" value="${esc(f.nom_fournisseur)}" onchange="updateFournisseur('${esc(f.code_fournisseur)}','nom_fournisseur',this.value)">
      <input type="text" placeholder="Groupe" value="${esc(f.groupe_fournisseur||"")}" onchange="updateFournisseur('${esc(f.code_fournisseur)}','groupe_fournisseur',this.value)">
      <button class="btn btn-danger btn-small" onclick="deleteFournisseur('${esc(f.code_fournisseur)}')">${ICON.trash} Supprimer</button>
    </div>`;
  });
  return html;
}

function renderParamSauvegarde(){
  const days = daysSinceBackup();
  return `
    <div class="helper-text">Exporte toutes tes données (achats, produits, fournisseurs, groupes) dans un fichier JSON que tu peux conserver comme sauvegarde. Un rappel s'affiche automatiquement si plus de 8 jours se sont écoulés depuis la dernière sauvegarde.</div>
    <div class="card">
      <div class="receipt-line"><span>Dernière sauvegarde</span><span>${isFinite(days) ? Math.floor(days)+" j" : "jamais"}</span></div>
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="backupNow()">${ICON.download} Télécharger une sauvegarde JSON</button>
  `;
}

render();
loadAll();
</script>
</body>
</html>
